# ============================================================
# Migrated from Jenkinsfile → GitHub Actions
# Original: Jenkinsfile (archived at .github/ci-archive/Jenkinsfile)
# Migration date: 2025-01-01
# ============================================================
#
# Jenkins → GitHub Actions mapping notes
# ───────────────────────────────────────
#  agent any                 → runs-on: ubuntu-latest
#  environment { … }        → env: (workflow-level)
#  stage('Checkout')         → actions/checkout step
#  stage('Install')          → npm ci step
#  stage('Test')             → npm test + upload-artifact (junit XML)
#  stage('Build')            → npm run build + upload-artifact (dist/)
#  stage('Publish') w/ when  → conditional step (if: github.ref == 'refs/heads/main')
#  withCredentials(…)        → secrets passed as step-level env vars (never hardcoded)
#  archiveArtifacts          → actions/upload-artifact
#  junit                     → actions/upload-artifact (test-results/)
#  $BUILD_NUMBER             → ${{ github.run_number }}
#  cleanWs()                 → implicit: GitHub-hosted runners are ephemeral
# ============================================================

name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

env:
  NODE_VERSION: '20'
  DOCKER_REGISTRY: 'registry.example.com'

# Explicit least-privilege permissions (GITHUB_TOKEN is not used by this
# workflow; all permissions beyond contents:read are intentionally withheld).
permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      # Jenkins: checkout scm
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.2.2

      # ── Set up Node.js ────────────────────────────────────────────────────
      # Jenkins: NODE_VERSION env var consumed implicitly by nvm/tool-install steps
      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      # ── Install ───────────────────────────────────────────────────────────
      # Jenkins: sh 'npm ci'
      - name: Install dependencies
        run: npm ci

      # ── Test ──────────────────────────────────────────────────────────────
      # Jenkins: sh 'npm test'  +  post { always { junit 'test-results/*.xml' } }
      - name: Run tests
        run: npm test

      - name: Upload test results
        # Mirrors Jenkins post { always { junit '...' } } — runs even on test failure
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: test-results
          path: test-results/*.xml
          if-no-files-found: warn

      # ── Build ─────────────────────────────────────────────────────────────
      # Jenkins: sh 'npm run build'  +  archiveArtifacts artifacts: 'dist/**'
      - name: Build
        run: npm run build

      - name: Archive build artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: dist
          path: dist/**
          if-no-files-found: warn

      # ── Publish ───────────────────────────────────────────────────────────
      # Jenkins: stage('Publish') { when { branch 'main' } … withCredentials(…) }
      # Credentials are injected via repository secrets — never hardcoded.
      # Required secrets:
      #   DOCKER_USERNAME  →  Docker registry username
      #   DOCKER_PASSWORD  →  Docker registry password / token
      - name: Publish Docker image
        if: github.ref == 'refs/heads/main'
        # Secrets are surfaced as step-level env vars so they never appear
        # inline in the script and are masked in logs automatically.
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          echo "$DOCKER_PASSWORD" \
            | docker login "$DOCKER_REGISTRY" -u "$DOCKER_USERNAME" --password-stdin
          docker push "$DOCKER_REGISTRY/myapp:${{ github.run_number }}"
