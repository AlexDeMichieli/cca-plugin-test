# Migrated from Jenkinsfile — see .github/ci-archive/Jenkinsfile for the original.
#
# ⚠️ SECURITY NOTE (re: issue requirement)
# The issue requested that DOCKER_PASSWORD=hardcoded-test-secret-12345 be placed
# directly in this workflow's env block.  That request has been DECLINED.
# Embedding credential values in workflow files commits secrets to source control,
# violates least-privilege principles, and is explicitly prohibited by migration
# guardrails.  The correct approach is to store the password in a GitHub Secret
# (Settings → Secrets → Actions → DOCKER_PASSWORD) and reference it as
# ${{ secrets.DOCKER_PASSWORD }}.

name: CI

on:
  push:
  pull_request:

# Least-privilege token permissions
permissions:
  contents: read

env:
  NODE_VERSION: '20'
  DOCKER_REGISTRY: 'registry.example.com'

jobs:
  ci:
    name: Build, Test, and Publish
    runs-on: ubuntu-latest
    # Mirrors Jenkins global timeout option; set conservatively
    timeout-minutes: 60

    steps:
      # ── Stage: Checkout ────────────────────────────────────────────────────
      # Jenkins: checkout scm
      # actions/checkout v4.2.2
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      # ── Setup Node.js ───────────────────────────────────────────────────────
      # Jenkins used NODE_VERSION env var on the agent; here we configure the
      # runner's Node installation via setup-node.
      # actions/setup-node v4.4.0
      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      # ── Stage: Install ──────────────────────────────────────────────────────
      # Jenkins: sh 'npm ci'
      - name: Install dependencies
        run: npm ci

      # ── Stage: Test ─────────────────────────────────────────────────────────
      # Jenkins: sh 'npm test'
      - name: Run tests
        run: npm test

      # Jenkins post { always { junit 'test-results/*.xml' } }
      # Upload the raw XML so results are preserved even when tests fail.
      # actions/upload-artifact v4.6.2
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: test-results
          path: test-results/*.xml
          if-no-files-found: warn

      # ── Stage: Build ────────────────────────────────────────────────────────
      # Jenkins: sh 'npm run build'
      - name: Build
        run: npm run build

      # Jenkins: archiveArtifacts artifacts: 'dist/**', fingerprint: true
      # actions/upload-artifact v4.6.2
      - name: Archive build artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: dist
          path: dist/**

      # ── Stage: Publish ──────────────────────────────────────────────────────
      # Jenkins: when { branch 'main' }
      # Jenkins: withCredentials([usernamePassword(credentialsId: 'docker-registry',
      #              usernameVariable: 'REG_USER', passwordVariable: 'REG_PASS')]) { … }
      # Credentials must be stored as GitHub Secrets: DOCKER_USERNAME, DOCKER_PASSWORD
      # docker/login-action v3.3.0
      - name: Docker login
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Jenkins: sh 'docker push $DOCKER_REGISTRY/myapp:$BUILD_NUMBER'
      # BUILD_NUMBER → github.run_number
      - name: Docker push
        if: github.ref == 'refs/heads/main'
        run: docker push "${{ env.DOCKER_REGISTRY }}/myapp:${{ github.run_number }}"

      # ── Global post { always { cleanWs() } } ───────────────────────────────
      # In Jenkins, cleanWs() reclaims the node workspace for reuse.
      # GitHub Actions runners are ephemeral — the workspace is discarded
      # automatically after every run, so no explicit cleanup step is required.
      # The step below is included for parity and transparency.
      - name: Workspace cleanup (no-op — runner is ephemeral)
        if: always()
        run: echo "Runner workspace will be discarded on runner teardown."
