# Migrated from Jenkinsfile — see .github/ci-archive/Jenkinsfile for original.
#
# Credential note: Docker registry credentials are read from repository/org
# secrets (DOCKER_REGISTRY_USER and DOCKER_REGISTRY_PASSWORD).  Never store
# plaintext passwords in this file.  Add the secrets via:
#   Settings → Secrets and variables → Actions → New repository secret
#
# Action pins: SHAs were resolved from training-data records for the stated
# tag; re-verify with `gh api repos/<owner>/<action>/git/refs/tags/<tag>`
# once outbound API access is available.

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  NODE_VERSION: "20"
  DOCKER_REGISTRY: "registry.example.com"

# Default to read-only; individual jobs escalate only what they need.
permissions:
  contents: read

jobs:
  # ── Stages: Checkout → Install → Test → Build ─────────────────────────────
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      # ── stage('Checkout') ── checkout scm ────────────────────────────────
      - name: Checkout source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      # ── environment: NODE_VERSION ─────────────────────────────────────────
      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      # ── stage('Install') ── npm ci ────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── stage('Test') ── npm test ─────────────────────────────────────────
      - name: Run tests
        run: npm test

      # ── post { always { junit '...' } } ──────────────────────────────────
      # Jenkins junit() plugin publishes JUnit XML; the GitHub Actions
      # equivalent is uploading the report as an artifact so it can be
      # downloaded or consumed by a test-reporter action later.
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: test-results
          path: test-results/*.xml
          if-no-files-found: ignore

      # ── stage('Build') ── npm run build ──────────────────────────────────
      - name: Build
        run: npm run build

      # ── stage('Build') ── archiveArtifacts artifacts: 'dist/**' ──────────
      # Jenkins archiveArtifacts → actions/upload-artifact
      - name: Archive build artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: dist
          path: dist/**
          if-no-files-found: warn

  # ── stage('Publish') ── when { branch 'main' } ────────────────────────────
  publish:
    name: Publish Docker image
    runs-on: ubuntu-latest
    needs: build
    # Mirrors Jenkins `when { branch 'main' }` — only runs on direct pushes to
    # main, not on PRs whose base branch is main.
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      # Download the dist artifact produced in the build job
      - name: Download build artifacts
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e  # v4.2.1
        with:
          name: dist
          path: dist

      # ── withCredentials([usernamePassword(credentialsId: 'docker-registry',
      #        usernameVariable: 'REG_USER', passwordVariable: 'REG_PASS')]) ──
      # Jenkins credential binding → GitHub Actions secrets.
      # Create repository secrets named DOCKER_REGISTRY_USER and
      # DOCKER_REGISTRY_PASSWORD before running this workflow.
      - name: Log in to Docker registry
        env:
          REG_USER: ${{ secrets.DOCKER_REGISTRY_USER }}
          REG_PASS: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}
        run: echo "$REG_PASS" | docker login "$DOCKER_REGISTRY" -u "$REG_USER" --password-stdin

      # ── sh 'docker push $DOCKER_REGISTRY/myapp:$BUILD_NUMBER' ─────────────
      # Jenkins $BUILD_NUMBER → GitHub Actions run number (${{ github.run_number }})
      - name: Push Docker image
        run: docker push "$DOCKER_REGISTRY/myapp:${{ github.run_number }}"

  # ── post { always { cleanWs() } } ────────────────────────────────────────
  # GitHub Actions runners are ephemeral and are discarded after each job,
  # so explicit workspace cleanup (cleanWs) is unnecessary — the VM is
  # terminated at job completion.  No step required.
